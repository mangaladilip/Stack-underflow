<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stack POP Simulation</title>

<style>
body {
    font-family: Arial, sans-serif;
    color: #232323;
    text-align: center;
    background: #f5f5f5;
}

.container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 20px;
}

/* Code */
.code {
    text-align: left;
    background: #fff;
    padding: 10px;
    border: 2px solid #232323;
    width: 220px;
    font-size: 14px;
}

.line {
    padding: 4px;
}

.active {
    background: #724b9e;
    color: white;
}

/* Stack */
.stack-box {
    width: 180px;
    height: 260px;
    background: #e8d227;
    border: 3px solid #232323;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    padding: 8px;
}

.block {
    width: 110px;
    height: 35px;
    border: 2px solid #232323;
    margin: 4px 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
}

.top {
    background: #724b9e;
    color: white;
}

/* Output */
.output-container {
    margin-top: 10px;
}

.output-box {
    width: 180px;
    height: 80px;
    border: 3px solid #232323;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}

/* Length display */
.length-box {
    margin-top: 10px;
    font-weight: bold;
}

/* Buttons */
button {
    margin: 12px;
    padding: 8px 16px;
    background: #724b9e;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<h2>Stack POP Simulation</h2>

<div class="container">

    <!-- Code -->
    <div class="code">
        <div class="line" id="l1">if len(stack) == 0:</div>
        <div class="line" id="l2">    print("Underflow")</div>
        <div class="line" id="l3">else:</div>
        <div class="line" id="l4">    item = stack.POP()</div>
        <div class="line" id="l5">    print(item)</div>
    </div>

    <!-- Stack + Output -->
    <div>
        <h3>Stack</h3>
        <div class="stack-box" id="stackBox"></div>

        <!-- Length -->
        <div class="length-box" id="lengthBox">
            Length: 5
        </div>

        <!-- Output -->
        <div class="output-container">
            <h4>Output</h4>
            <div class="output-box" id="outputBox">--</div>
        </div>
    </div>

</div>

<button onclick="POPStep()">POP</button>
<button onclick="resetSim()">Refresh</button>

<script>
let initialStack = [10, 20, 30, 40, 50];
let stack = [...initialStack];

let stage = 0;
let POPpedItem = null;

function renderStack() {
    const box = document.getElementById('stackBox');
    box.innerHTML = "";

    stack.forEach((val, index) => {
        let div = document.createElement('div');
        div.className = "block";
        div.innerText = val;

        if (index === stack.length - 1) {
            div.classList.add("top");
        }

        box.appendChild(div);
    });

    // Update length
    document.getElementById("lengthBox").innerText = "Length: " + stack.length;
}

function clearHighlight() {
    document.querySelectorAll('.line').forEach(l => l.classList.remove('active'));
}

function POPStep() {
    clearHighlight();

    if (stage === 0) {
        document.getElementById("l1").classList.add("active");
        stage = 1;
        return;
    }

    if (stage === 1 && stack.length === 0) {
        document.getElementById("l2").classList.add("active");
        document.getElementById("outputBox").innerText = "Underflow";
        stage = 0;
        return;
    }

    if (stage === 1) {
        document.getElementById("l3").classList.add("active");
        stage = 2;
        return;
    }

    if (stage === 2) {
        document.getElementById("l4").classList.add("active");
        POPpedItem = stack.POP();
        renderStack();
        stage = 3;
        return;
    }

    if (stage === 3) {
        document.getElementById("l5").classList.add("active");
        document.getElementById("outputBox").innerText = POPpedItem;
        stage = 0;
    }
}

function resetSim() {
    stack = [...initialStack];
    document.getElementById("outputBox").innerText = "--";
    clearHighlight();
    stage = 0;
    renderStack();
}

renderStack();
</script>

</body>
</html>
